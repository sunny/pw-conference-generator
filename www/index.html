<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title data-title="Générateur de conférences Paris Web">
    Générateur de conférences Paris Web
  </title>

  <link rel="stylesheet" href="./css/index.css?version" />
  <script src="./js/index.js?version" type="module"></script>
  <link
    rel="icon"
    href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' color='red' font-size='90'&gt;🤖&lt;/text&gt;&lt;/svg&gt;"
  />
</head>
<body>

<div class="container">
  <div class="conferenceName" aria-live="assertive" data-conference-name>
    <noscript>Nécessite JavaScript pour fonctionner.</noscript>
  </div>
  <button class="btn" data-conference-generate disabled>
    Nouvelle conférence
  </button>
</div>

<div class="explanation">
  <div class="explanation__content">
    <p>
      Ceci est un générateur non officiel de noms de conférences pour
      <a href="https://www.paris-web.fr/" translate="no">Paris Web</a>,<br />
      l’événement du 24 au 26 septembre 2026
      pour un web accessible et de qualité. ♥
    </p>

    <p>

      <a href="https://github.com/sunny/pw-conference-generator">code source</a>
      sous <a href="https://firstdonoharm.dev/" hreflang="en">licence hippocratique</a>
    </p>
  </div>
</div>

</body>
</html>
